name: aria
on:
  push:
    branches:
      - 'main'
    paths:
      - 'common/**'
      - 'index.html'
      - '.github/workflows/aria.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages-push
  queue: max

jobs:
  update-aria:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: w3c/spec-prod@v2
        with:
          GH_PAGES_BRANCH: gh-pages
          BUILD_FAIL_ON: nothing