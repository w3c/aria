name: pdf-aam
on:
  push:
    branches:
      - 'main'
    paths:
      - 'common/**'
      - 'pdf-aam/**'
      - '.github/workflows/pdf-aam.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages-push
  queue: max

jobs:
  update-pdf-aam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: w3c/spec-prod@v2
        with:
          TOOLCHAIN: respec
          SOURCE: pdf-aam/index.html
          DESTINATION: pdf-aam/index.html
          GH_PAGES_BRANCH: gh-pages
          BUILD_FAIL_ON: nothing
